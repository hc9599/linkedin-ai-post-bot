name: Daily LinkedIn Post
on:
  schedule:
    - cron: 30 3 * * 1-5
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Wait a random delay (up to 30 minutes)
        if: github.event_name == 'schedule'
        run: |
            DELAY=$(( RANDOM % 1800 ))
            echo "Sleeping for $DELAY seconds (~$(( DELAY / 60 ))m)"
            sleep $DELAY

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          DRY_RUN: "false"
        run: python script.py
